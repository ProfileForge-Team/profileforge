
services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: profileforge-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: profileforge
      RABBITMQ_DEFAULT_PASS: profileforge
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  auth-db:
    image: postgres:16
    container_name: profileforge-auth-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
    volumes:
      - auth_db_data:/var/lib/postgresql/data

  auth-service:
    build:
      context: ../services/auth-service
    container_name: profileforge-auth-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+psycopg2://auth_user:auth_password@auth-db:5432/auth_db
      SECRET_KEY: dev_secret_change_later
      RABBITMQ_URL: amqp://profileforge:profileforge@rabbitmq:5672/
      RABBITMQ_EXCHANGE_NAME: profileforge.events
    depends_on:
      - auth-db
      - rabbitmq

  auth-worker:
    build:
      context: ../services/auth-service
    container_name: profileforge-auth-worker
    command: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: postgresql+psycopg2://auth_user:auth_password@auth-db:5432/auth_db
      SECRET_KEY: dev_secret_change_later
      RABBITMQ_URL: amqp://profileforge:profileforge@rabbitmq:5672/
      RABBITMQ_EXCHANGE_NAME: profileforge.events
    depends_on:
      - auth-db
      - rabbitmq

volumes:
  rabbitmq_data:
  auth_db_data: